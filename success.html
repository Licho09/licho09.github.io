<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed - Foam Flow Leads</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JKLEK6QQDY"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-JKLEK6QQDY');
        gtag('event', 'call_booked', { event_category: 'Conversion', event_label: 'Strategy Call Booked' });
    </script>

    <!-- Meta Pixel -->
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '1525517045371976');
    fbq('track', 'PageView');
    fbq('track', 'Schedule');
    </script>
    <noscript><img height="1" width="1" style="display:none"
        src="https://www.facebook.com/tr?id=1525517045371976&ev=PageView&noscript=1"/></noscript>

    <style>
        :root {
            --bg: #ffffff;
            --text: #111111;
            --text-muted: #666666;
            --highlight: #FFE566;
            --highlight-dark: #f5d800;
            --border: #e8e8e8;
            --card-bg: #ffffff;
            --progress-bg: #f0f0f0;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER */
        .simple-header {
            padding: 2rem 1.5rem 1rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .logo-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 0.18em;
            color: var(--text);
        }

        /* MAIN */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
        }

        /* CARD */
        .confirm-card {
            background: var(--card-bg);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 2px 24px rgba(0,0,0,0.08);
            animation: fadeUp 0.35s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* CHECK ICON */
        .check-ring {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--highlight);
            border: 2px solid var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem;
            box-shadow: 3px 3px 0 var(--text);
        }

        /* BADGE */
        .booking-result-badge {
            display: inline-block;
            background: #dcfce7;
            color: #15803d;
            font-size: 13px;
            font-weight: 800;
            padding: 6px 16px;
            border-radius: 100px;
            margin-bottom: 14px;
            border: 1px solid #bbf7d0;
        }

        .confirm-title {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--text);
            margin-bottom: 0.4rem;
            letter-spacing: -0.02em;
        }

        .confirm-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 1.75rem;
        }

        /* DETAILS BLOCK */
        .details-block {
            background: #fafafa;
            border: 1.5px solid var(--border);
            border-left: 4px solid var(--highlight-dark);
            border-radius: 8px;
            padding: 1rem 1.25rem;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 1.25rem;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            gap: 1rem;
        }

        .detail-label {
            color: var(--text-muted);
            flex-shrink: 0;
            font-weight: 600;
        }

        .detail-value {
            font-weight: 700;
            color: var(--text);
            text-align: right;
        }

        /* NOTE */
        .confirm-note {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        /* BUTTON */
        .btn-home {
            display: block;
            padding: 1rem 1.75rem;
            background: var(--highlight);
            color: var(--text);
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 800;
            font-family: 'Inter', sans-serif;
            text-decoration: none;
            text-align: center;
            border: 2.5px solid var(--text);
            cursor: pointer;
            width: 100%;
            box-shadow: 3px 3px 0 var(--text);
            transition: all 0.18s ease;
        }

        .btn-home:hover {
            transform: translate(-1px, -1px);
            box-shadow: 5px 5px 0 var(--text);
        }

        .btn-home:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0 var(--text);
        }

        /* FOOTER */
        .simple-footer {
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
        }

        @media (max-width: 480px) {
            .confirm-card {
                padding: 1.75rem 1.25rem;
            }
            .confirm-title {
                font-size: 1.25rem;
            }
        }
    </style>
</head>

<body>

    <header class="simple-header">
        <div class="logo-text">FOAM FLOW LEADS</div>
    </header>

    <main>
        <div class="confirm-card">

            <div class="check-ring">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none"
                    stroke="#111" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>

            <div class="booking-result-badge">✅ You're Booked</div>

            <h1 class="confirm-title">Your call is confirmed.</h1>
            <p class="confirm-subtitle">We'll reach out shortly to prepare for your strategy call.</p>

            <div class="details-block">
                <div class="detail-row">
                    <span class="detail-label">Name</span>
                    <span class="detail-value" id="confName">---</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Phone</span>
                    <span class="detail-value" id="confPhone">---</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Appointment</span>
                    <span class="detail-value" id="confDateTime">---</span>
                </div>
            </div>

            <p class="confirm-note">🔒 Remember — 15 booked appointments in 45 days or you don't pay.</p>

            <a href="index.html" class="btn-home">Return Home →</a>

        </div>
    </main>

    <footer class="simple-footer">
        <p>© 2026 Foam Flow Leads. All rights reserved.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const params = new URLSearchParams(window.location.search);
            const name     = params.get('name')     || localStorage.getItem('lastBookingName')     || '---';
            const phone    = params.get('phone')    || localStorage.getItem('lastBookingPhone')    || '---';
            const dateTime = params.get('dateTime') || localStorage.getItem('lastBookingDateTime') || '---';

            document.getElementById('confName').textContent     = name;
            document.getElementById('confPhone').textContent    = phone;
            document.getElementById('confDateTime').textContent = dateTime;

            var count = 200;
            var defaults = { origin: { y: 0.7 } };
            function fire(particleRatio, opts) {
                confetti(Object.assign({}, defaults, opts, {
                    particleCount: Math.floor(count * particleRatio)
                }));
            }
            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2,  { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            fire(0.1,  { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
            fire(0.1,  { spread: 120, startVelocity: 45 });
        });
    </script>

</body>
</html>
